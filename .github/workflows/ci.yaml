name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly canary against newer ClamAV images (see integration-canary).
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go vet ./...
      - run: go build ./... && go build -tags=integration ./...
      - run: go test -race -count=1 ./...
      - name: Short fuzz pass
        run: go test -run='^$' -fuzz=FuzzParseScanResponse -fuzztime=30s ./internal/proto/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: EICAR plaintext guard
        run: bash ./scripts/check-eicar.sh tracked
      - name: Zero-dependency policy (ADR-0003)
        run: |
          if grep -Eq '^require' go.mod; then
            echo "go.mod gained a require directive; the module is standard-library only (ADR-0003)." >&2
            exit 1
          fi
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Required: pinned ClamAV versions. 1.4 is the LTS default (EOL
  # 2027-08-15), 1.5 the current regular release. 1.0 was dropped at its
  # EOL (2025-11-28). `latest` is intentionally NOT here — see
  # integration-canary.
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        clamav: ["1.4", "1.5"]
    env:
      CLAMAV_IMAGE: clamav/clamav:${{ matrix.clamav }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Start clamd
        run: make integration-up
      - name: Integration tests
        run: make test-integration
      - name: clamd logs
        if: failure()
        run: make integration-logs
      - name: Teardown
        if: always()
        run: make integration-down

  # Canary only: tracks the moving `latest` image on the weekly schedule so
  # upstream changes surface as signal without breaking required CI.
  integration-canary:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CLAMAV_IMAGE: clamav/clamav:latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Start clamd
        run: make integration-up
      - name: Integration tests
        run: make test-integration
      - name: clamd logs
        if: failure()
        run: make integration-logs
      - name: Teardown
        if: always()
        run: make integration-down
