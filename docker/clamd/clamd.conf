# clamd configuration for the go-clamav integration test environment.
#
# This is a TEST configuration: limits are deliberately tiny so the size
# limit code paths can be exercised quickly. See docs/operations.md for
# production guidance.

Foreground yes
LogVerbose yes

DatabaseDirectory /var/lib/clamav

# Unix socket, bind-mounted to the host at ./docker/run/clamd.sock.
# Mode 666 so the (unprivileged) host test process can connect.
LocalSocket /run/clamav/clamd.sock
LocalSocketMode 666

# TCP socket, published to the host as 127.0.0.1:3310.
TCPSocket 3310
TCPAddr 0.0.0.0

# Small stream limit so integration tests can trigger
# "INSTREAM size limit exceeded. ERROR" with a 6 MiB payload.
StreamMaxLength 5M
MaxScanSize 10M
MaxFileSize 10M

MaxThreads 4
IdleTimeout 30
